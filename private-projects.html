<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="css/apps.css">
    <style>
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .project-card {
            border: 1px solid #ffcccc;
            border-radius: 5px;
            padding: 15px;
            background: #fff5f5;
            box-shadow: 0 2px 5px rgba(200,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(200,0,0,0.15);
            border-color: #cc0000;
        }
        .project-card-danger {
            background: #ffebeb;
            border: 2px solid #cc0000;
            box-shadow: 0 0 10px rgba(200,0,0,0.2) inset, 0 2px 8px rgba(200,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .project-card-danger::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 5px; height: 100%;
            background: #cc0000;
        }
        .project-card-danger:hover {
            border-color: #990000;
            background: #ffd6d6;
            box-shadow: 0 0 14px rgba(200,0,0,0.3) inset, 0 4px 12px rgba(200,0,0,0.3);
        }
        .project-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            color: #990000;
            word-wrap: break-word;
        }
        .project-lang {
            font-size: 12px;
            color: #660000;
            margin-bottom: 10px;
            display: inline-block;
            background: #ffdddd;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 500;
        }
        .project-desc {
            font-size: 13px;
            color: #440000;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .project-link {
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            color: #cc0000;
            text-decoration: none;
        }
        .project-link:hover {
            color: #ff0000;
            text-decoration: underline;
        }
        .project-link svg {
            width: 14px;
            height: 14px;
            margin-right: 4px;
        }

        h1 { color: #990000; }
        
        .warn-banner {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 720px) {
            .projects-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .project-card {
                padding: 12px;
            }
        }

        /* Modal Styles */
        #joke-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 100; }
        .joke-box { background: #fff; border: 1px solid #999; border-radius: 5px; width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
        .joke-title { background: linear-gradient(to bottom, #ffebeb 0%, #ffcccc 100%); padding: 8px 10px; font-weight: bold; font-size: 13px; color: #990000; border-bottom: 1px solid #cc0000; display: flex; justify-content: space-between; }
        .joke-content { padding: 20px; font-size: 13px; text-align: left; display: flex; align-items: center; gap: 15px; white-space: pre-wrap; color: #333; line-height: 1.5; }
        .btn-ok { align-self: flex-end; margin: 0 10px 10px 0; padding: 5px 20px; border: 1px solid #cc0000; background: linear-gradient(to bottom, #fff5f5 0%, #ffebeb 100%); color: #990000; font-weight: bold; border-radius: 3px; cursor: pointer; transition: background 0.2s; }
        .btn-ok:hover { background: #ffcccc; }
    </style>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/db6dqsq9i/image/upload/v1779719390/Naveen_bhenll.jpg"/>
</head>
<body>
    <div class="container">
        <div class="warn-banner">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            CONFIDENTIAL: PRIVATE REPOSITORIES
        </div>
        <h1>My Private Projects</h1>
        <p>A collection of my private GitHub repositories. These are internal tools, experiments, and classified projects. <span style="color: #cc0000; font-weight: 600;">There are more but for privacy and sanity issues I am not listing them here.</span></p>
        
        <div class="projects-grid" id="projects-container">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Error Modal -->
    <div id="joke-modal">
        <div class="joke-box">
            <div class="joke-title">
                <span id="joke-title-text">Windows Security Alert</span>
                <span style="cursor:pointer;" onclick="closeJoke()">X</span>
            </div>
            <div class="joke-content">
                <svg id="joke-icon" style="flex-shrink:0;" viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" fill="#e04040" stroke="none"/><line x1="15" y1="9" x2="9" y2="15" stroke="#fff" stroke-width="2"/><line x1="9" y1="9" x2="15" y2="15" stroke="#fff" stroke-width="2"/></svg>
                <div id="joke-msg">msg</div>
            </div>
            <button class="btn-ok" onclick="closeJoke()">I Understand</button>
        </div>
    </div>

    <script>
    const projects = [
        {
            name: "Guardian-AI",
            lang: "Python, AI/ML",
            desc: "An intelligent student safety and monitoring system designed to predict and reduce dropout rates using real-time alerts and predictive analytics."
        },

        {
            name: "SQL-Mobile-Playground",
            lang: "SQL, Mobile Development",
            desc: "An interactive mobile application that allows users to write, execute, and experiment with SQL queries in a hands-on learning environment."
        },

        {
            name: "AI-Voice-Model-Offline",
            lang: "Python, AI",
            desc: "A lightweight offline-capable voice recognition system engineered for local AI inference without internet connectivity."
        },

        {
            name: "All-Cutoff-Calculator",
            lang: "Python, Web",
            desc: "A precision-based academic cutoff calculator developed for Tamil Nadu entrance systems with accurate score computation."
        },

        {
            name: "Frequency-Analysis-App",
            lang: "Python, Data Analysis",
            desc: "A statistical data analysis application capable of performing frequency analysis for pattern recognition and data interpretation."
        },

        {
            name: "Gen-AI",
            lang: "Python, Generative AI",
            desc: "An exploratory Generative AI project integrating intelligent context-aware response generation and advanced AI capabilities."
        }
 ];

    const container = document.getElementById('projects-container');

    projects.forEach(proj => {
        const card = document.createElement('div');

        card.className = 'project-card';

        card.innerHTML = `
            <div class="project-title">${proj.name.replace(/-/g, ' ')}</div>
            <div class="project-lang">${proj.lang}</div>
            <div class="project-desc">${proj.desc}</div>

            <a href="javascript:void(0)" 
               class="project-link" 
               onclick="openJoke(event, \'${proj.name.replace(/-/g, ' ')}\')">

                <svg viewBox="0 0 24 24" 
                     fill="none" 
                     stroke="currentColor" 
                     stroke-width="2">

                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>

                </svg>

                Private Repository
            </a>
        `;

        container.appendChild(card);
    });

    // Modal Logic
    let clickCount = 0;

    const defaultMessages = [
        "ACCESS DENIED.\n\nThese repositories are currently private and protected.",
        "PRIVATE REPOSITORY.\n\nProject source code access is restricted.",
        "SECURITY PROTECTION ENABLED.\n\nOnly authorized collaborators can access this repository.",
        "REPOSITORY LOCKED.\n\nSource code visibility is currently disabled."
    ];

    const customMessages = {

        "Guardian AI":
        "Guardian AI is currently protecting its core systems.\n\nAccess to predictive safety modules is restricted.",

        "SQL Mobile Playground":
        "Interactive database playground detected.\n\nOnly enrolled testers can execute SQL simulations.",

        "AI Voice Model Offline":
        "Offline voice engine initialized.\n\nNeural speech models are securely sandboxed.",

        "All Cutoff Calculator":
        "Cutoff computation engine is currently private.\n\nAcademic prediction modules are protected.",

        "Frequency Analysis App":
        "Statistical analysis core locked.\n\nPattern recognition systems require authorization.",

        "Gen AI":
        "Generative AI systems are active.\n\nLarge language experimentation modules are confidential."
    };

    function openJoke(e, projectName) {

        e.preventDefault();

        clickCount++;

        let msgToShow = "";

        if (clickCount === 5) {

            msgToShow =
            "PERSISTENCE DETECTED.\n\nYour curiosity level is impressive,\nbut these repositories are still private.";

        } else {

            msgToShow =
            customMessages[projectName] ||
            defaultMessages[Math.floor(Math.random() * defaultMessages.length)];
        }

        document.getElementById('joke-msg').innerText = msgToShow;

        document.getElementById('joke-modal').style.display = 'flex';
    }

    function closeJoke() {
        document.getElementById('joke-modal').style.display = 'none';
    }
</script>
