<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About NaveenOS</title>
    <link rel="stylesheet" href="css/apps.css">
    <style>
        .about-card {
            border: 1px solid #d7d7d7;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .about-head {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }
        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #cfcfcf;
        }
        .meta {
            margin: 4px 0;
            color: #555;
            font-size: 14px;
        }
    </style>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/db6dqsq9i/image/upload/v1779719390/Naveen_bhenll.jpg"/>
</head>
<body>
    <div class="container">
        <h1>About NaveenOS</h1>
        <div class="about-card">
            <div class="about-head">
                <img class="avatar" src="https://res.cloudinary.com/db6dqsq9i/image/upload/v1779719390/Naveen_bhenll.jpg" alt="Naveen">
                <div>
                    <h2 style="margin: 0;">Naveen</h2>
                    <p class="meta">Data Engineer</p>
                </div>
            </div>
            <p style="margin: 0; line-height: 1.6;">
                Windows 7 themed portfolio experience showcasing projects, resume, technical skills, and contact links.
            </p>
        </div>
    </div>
</body>
</html>
