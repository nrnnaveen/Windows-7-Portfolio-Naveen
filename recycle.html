<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recycle Bin</title>
    <link rel="stylesheet" href="css/apps.css">
    <style>
        body {
            background-color: #fff;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .explorer-toolbar {
            background: linear-gradient(to bottom, #f2f6fb 0%, #e4ebf6 100%);
            border-bottom: 1px solid #c4ccda;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .nav-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #555;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.5);
            border-color: #b5c4df;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .nav-btn svg { width: 16px; height: 16px; }
        
        .address-bar {
            flex: 1;
            background: #fff;
            border: 1px solid #bcc6d5;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            font-size: 13px;
        }
        
        .toolbar-menu {
            background: #f0f4f9;
            border-bottom: 1px solid #d9e3f1;
            padding: 5px 15px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #333;
        }
        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 4px 8px;
            border: 1px solid transparent;
            border-radius: 3px;
        }
        .toolbar-btn:hover {
            background: #dbeefd;
            border-color: #bce4fe;
        }
        .toolbar-btn svg { width: 14px; height: 14px; stroke: #003399; }

        .file-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            flex: 1;
            overflow-y: auto;
            align-content: flex-start;
        }
        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 10px 5px;
            border: 1px solid transparent;
            border-radius: 3px;
            cursor: pointer;
        }
        .file-item:hover {
            background: rgba(46, 141, 236, 0.1);
            border: 1px solid rgba(46, 141, 236, 0.3);
        }
        .file-item.selected {
            background: rgba(46, 141, 236, 0.2);
            border: 1px solid rgba(46, 141, 236, 0.5);
        }
        .file-icon {
            width: 52px;
            height: 52px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
            display: block; /* Removed inline-block spacing anomalies */
        }
        /* SVG definitions injected inline below */
        
        .file-name {
            font-size: 11px;
            color: #222;
            word-wrap: break-word;
            max-width: 100%;
            text-align: center;
            line-height: 1.3;
        }
        
        .empty-message {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            font-size: 14px;
        }

        .status-bar {
            background: #f0f4f9;
            border-top: 1px solid #d9e3f1;
            padding: 4px 15px;
            font-size: 12px;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
        
        /* Modal for double clicking items */
        #joke-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .joke-box {
            background: #fff;
            border: 1px solid #999;
            border-radius: 5px;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .joke-title {
            background: linear-gradient(to bottom, #f2f6fb 0%, #e4ebf6 100%);
            padding: 8px 10px;
            font-weight: bold;
            font-size: 13px;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
        }
        .joke-content {
            padding: 20px;
            font-size: 13px;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-ok {
            align-self: flex-end;
            margin: 0 10px 10px 0;
            padding: 5px 20px;
            border: 1px solid #0055cc;
            background: linear-gradient(to bottom, #f2f6fb 0%, #e4ebf6 100%);
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-ok:hover {
            background: #dbeefd;
        }
    </style>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/db6dqsq9i/image/upload/v1779719390/Naveen_bhenll.jpg"/>
</head>
<body>
    <div class="explorer-toolbar">
        <div class="nav-btn" title="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="nav-btn" title="Forward"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
        
        <div class="address-bar">
            <span>Recycle Bin</span>
        </div>
        
        <div class="address-bar" style="flex: 0 0 150px; display: flex; align-items: center;">
            <input type="text" id="recycle-search" placeholder="Search..." style="border: none; outline: none; font-style: italic; width: 100%; color: #555;">
        </div>
    </div>
    
    <div class="toolbar-menu">
        <div class="toolbar-btn" onclick="emptyBin()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            Empty the Recycle Bin
        </div>
        <div class="toolbar-btn" onclick="openJoke('Are you sure you want to restore these? Some things are better left buried.', 'warning')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 2v6h6M21.5 22v-6h-6"/><path d="M22 11.5A10 10 0 0 0 3.2 7.2M2 12.5a10 10 0 0 0 18.8 4.2"/></svg>
            Restore all items
        </div>
    </div>

    <!-- SVGS embedded directly so they don't break -->
    <svg style="display:none;" xmlns="http://www.w3.org/2000/svg">
        <symbol id="icon-doc" viewBox="0 0 64 64">
            <path d="M 12 4 L 38 4 L 52 18 L 52 60 C 52 62 50 64 48 64 L 16 64 C 14 64 12 62 12 60 L 12 4 Z" fill="#ffffff" stroke="#999999" stroke-width="2"/>
            <path d="M 38 4 L 38 18 L 52 18 Z" fill="#e6e6e6" stroke="#999999" stroke-width="1.5" stroke-linejoin="round"/>
            <line x1="20" y1="28" x2="44" y2="28" stroke="#cccccc" stroke-width="2" />
            <line x1="20" y1="36" x2="44" y2="36" stroke="#cccccc" stroke-width="2" />
            <line x1="20" y1="44" x2="34" y2="44" stroke="#cccccc" stroke-width="2" />
            <text x="14" y="22" font-family="sans-serif" font-size="10" font-weight="bold" fill="#d32f2f">PDF</text>
        </symbol>
        <symbol id="icon-code" viewBox="0 0 64 64">
            <path d="M 12 4 L 38 4 L 52 18 L 52 60 C 52 62 50 64 48 64 L 16 64 C 14 64 12 62 12 60 L 12 4 Z" fill="#2d2d2d" stroke="#111111" stroke-width="2"/>
            <path d="M 38 4 L 38 18 L 52 18 Z" fill="#4a4a4a" stroke="#111111" stroke-width="1.5" stroke-linejoin="round"/>
            <text x="18" y="44" font-family="monospace" font-size="18" font-weight="bold" fill="#a6e22e">&lt;/&gt;</text>
        </symbol>
        <symbol id="icon-img" viewBox="0 0 64 64">
            <!-- Image file mimicking the classic Windows 7 image icon borders -->
            <rect x="8" y="14" width="48" height="36" rx="2" fill="#ffffff" stroke="#aaaaaa" stroke-width="2" />
            <circle cx="20" cy="24" r="5" fill="#ffca28" />
            <path d="M 8 50 L 26 32 L 34 40 L 44 26 L 56 38 L 56 50 Z" fill="#66bb6a" />
            <rect x="8" y="14" width="48" height="36" rx="2" fill="none" stroke="#ffffff" stroke-width="1" />
        </symbol>
    </svg>

    <div class="file-grid" id="file-grid">
        <!-- Javascript will inject files here -->
    </div>
    
    <div class="empty-message" id="empty-state">
        <svg viewBox="0 0 64 64" width="64" height="64" opacity="0.5" xmlns="http://www.w3.org/2000/svg">
            <path d="M 18 24 L 46 24 L 42 54 L 22 54 Z" fill="#ddd" stroke="#999" stroke-width="2" />
            <ellipse cx="32" cy="24" rx="16" ry="4" fill="#eee" stroke="#999" stroke-width="2" />
            <line x1="24" y1="30" x2="26" y2="48" stroke="#aaa" stroke-width="2" />
            <line x1="32" y1="30" x2="32" y2="48" stroke="#aaa" stroke-width="2" />
            <line x1="40" y1="30" x2="38" y2="48" stroke="#aaa" stroke-width="2" />
        </svg>
        <p style="margin-top: 10px;">This folder is empty.</p>
    </div>

    <div class="status-bar">
        <span id="item-count">0 items</span>
        <span id="disk-space" style="display: none;">0 bytes</span>
    </div>

    <!-- Fake Modal -->
    <div id="joke-modal">
        <div class="joke-box">
            <div class="joke-title">
                <span id="joke-title-text">Windows Error</span>
                <span style="cursor:pointer;" onclick="closeJoke()">X</span>
            </div>
            <div class="joke-content">
                <svg id="joke-icon" style="flex-shrink:0;" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <div id="joke-msg">msg</div>
            </div>
            <button class="btn-ok" onclick="closeJoke()">OK</button>
        </div>
    </div>

    <script>
        const trashFiles = [
            { name: "old_portfolio_v1_final_FINAL.zip", type: "doc", joke: "You really don't want to look at your old code. Trust me." },
            { name: "My_Secret_Masterplan.txt", type: "code", joke: "Access Denied. You are not ready for world domination yet." },
            { name: "React_Framework_Boilerplate.js", type: "code", joke: "Error: Found bloated framework. Vanilla JS is the only way." },
            { name: "cringe_meme_2016.png", type: "img", joke: "Image is corrupted. Fortunately for your dignity." },
            { name: "TODO_list_from_2022.docx", type: "doc", joke: "You haven't done these things in 4 years, you won't do them now." },
            { name: "bug_that_made_me_cry.py", type: "code", joke: "Trigger warning: Uncaught Exceptions ahead." }
        ];

        const grid = document.getElementById('file-grid');
        const emptyState = document.getElementById('empty-state');
        const countStr = document.getElementById('item-count');
        const modal = document.getElementById('joke-modal');
        let renderedCount = trashFiles.length;

        function renderFiles() {
            grid.innerHTML = '';
            if (renderedCount === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'flex';
                countStr.innerText = '0 items';
                return;
            }

            trashFiles.forEach(file => {
                const el = document.createElement('div');
                el.className = 'file-item';
                el.innerHTML = `
                    <svg class="file-icon"><use href="#icon-${file.type}"></use></svg>
                    <span class="file-name">${file.name}</span>
                `;
                
                el.addEventListener('mousedown', (e) => {
                    document.querySelectorAll('.file-item').forEach(f => f.classList.remove('selected'));
                    el.classList.add('selected');
                    e.stopPropagation();
                });

                el.addEventListener('dblclick', () => {
                    openJoke(file.joke, 'error');
                });
                
                grid.appendChild(el);
            });
            countStr.innerText = `${renderedCount} items`;
        }

        document.addEventListener('mousedown', () => {
            document.querySelectorAll('.file-item').forEach(f => f.classList.remove('selected'));
        });

        function emptyBin() {
            if (renderedCount === 0) return;
            openJoke("Critical System Failure: Cannot delete these files. Your past cringe is a load-bearing structure of your current developer skills.", "error");
        }

        function openJoke(msg, type) {
            document.getElementById('joke-msg').innerText = msg;
            
            const iconSvg = document.getElementById('joke-icon');
            if (type === 'error') {
                iconSvg.innerHTML = `<circle cx="12" cy="12" r="10" fill="#e04040" stroke="none"/><line x1="15" y1="9" x2="9" y2="15" stroke="#fff" stroke-width="2"/><line x1="9" y1="9" x2="15" y2="15" stroke="#fff" stroke-width="2"/>`;
                document.getElementById('joke-title-text').innerText = "Windows Error";
            } else {
                iconSvg.innerHTML = `<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" fill="#fcdb03" stroke="#e0a800" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="13" stroke="#000" stroke-width="2"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="#000" stroke-width="3"/>`;
                document.getElementById('joke-title-text').innerText = "Windows Warning";
            }
            
            modal.style.display = 'flex';
        }

        closeJoke = function() {
            modal.style.display = 'none';
        }

        // Search logic
        document.getElementById('recycle-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            let visibleCount = 0;
            document.querySelectorAll('.file-item').forEach(el => {
                const text = el.innerText.toLowerCase();
                const match = text.includes(term);
                el.style.display = match ? 'flex' : 'none';
                if (match) visibleCount++;
            });
            countStr.innerText = `${visibleCount} items`;
        });

        renderFiles();
    </script>
</body>
</html>
